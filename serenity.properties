webdriver.driver=chrome
webdriver.autodownload=true
webdriver.base.url=http://localhost:5173

serenity.take.screenshots=FOR_EACH_ACTION
serenity.project.name=Reservas Sofka Screenplay Automation
serenity.logging=VERBOSE
serenity.console.colors=true
serenity.browser.maximized=true
serenity.timeout=10000
serenity.outputDirectory=target/site/serenity

# Chrome options for headless mode if needed in CI (not used locally by default unless specified)
chrome.switches=--remote-allow-origins=*
